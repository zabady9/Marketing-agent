services:
  nginx:
    image: nginx:1.27-alpine
    container_name: marketing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/options-ssl-nginx.conf:/etc/nginx/options-ssl-nginx.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks: [marketing-net]
    depends_on: [app, postiz]

  certbot:
    image: certbot/certbot:latest
    container_name: marketing-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

networks:
  marketing-net:
    external: true
    name: marketing-agent_marketing-net

volumes:
  certbot-webroot:
  certbot-certs:
